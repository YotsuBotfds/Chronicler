name: Validation Gate

on:
  workflow_dispatch:
    inputs:
      profile:
        description: Validation profile to run
        required: true
        default: full
        type: choice
        options:
          - subset
          - full
          - determinism-off
          - determinism-hybrid
  schedule:
    - cron: "0 8 * * 0"

jobs:
  canonical-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      PYTHONUNBUFFERED: "1"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install maturin
          python -m pip install -e .

      - name: Build Rust extension
        run: |
          cd chronicler-agents
          python -m maturin develop --release

      - name: Run canonical validation gate
        shell: bash
        run: |
          PROFILE="${{ github.event.inputs.profile || 'full' }}"
          python scripts/m53b_run_validation.py \
            --profile "$PROFILE" \
            --output-root "output/github-validation/${{ github.run_id }}"
