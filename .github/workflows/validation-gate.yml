name: Validation Gate

on:
  workflow_dispatch:
    inputs:
      profile:
        description: Validation profile to run
        required: true
        default: full
        type: choice
        options:
          - subset
          - full
          - determinism-off
          - determinism-hybrid
      require_strict_regression:
        description: Fail full-profile calibrated-floor regression passes
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "0 8 * * 0"

permissions:
  contents: read

jobs:
  canonical-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      PYTHONUNBUFFERED: "1"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install "maturin>=1.5,<2"
          python -m pip install -e .

      - name: Build Rust extension wheel
        run: |
          cd chronicler-agents
          python -m maturin build --release
          python -m pip install target/wheels/*.whl

      - name: Run canonical validation gate
        shell: bash
        run: |
          PROFILE="${{ github.event.inputs.profile || 'full' }}"
          STRICT_REGRESSION="${{ github.event.inputs.require_strict_regression || 'false' }}"
          EXTRA_ARGS=()
          if [[ "$STRICT_REGRESSION" == "true" ]]; then
            EXTRA_ARGS+=(--require-strict-regression)
          fi
          python scripts/m53b_run_validation.py \
            --profile "$PROFILE" \
            --output-root "output/github-validation/${{ github.run_id }}" \
            "${EXTRA_ARGS[@]}"

      - name: Publish validation gate summary
        if: always()
        shell: bash
        run: |
          while IFS= read -r summary; do
            echo "## Validation gate summary: $summary" >> "$GITHUB_STEP_SUMMARY"
            cat "$summary" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
          done < <(if [ -d "output/github-validation/${{ github.run_id }}" ]; then find "output/github-validation/${{ github.run_id }}" -name 'gate_summary_*.md' -type f | sort; fi)

      - name: Upload validation reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-gate-${{ github.run_id }}
          path: output/github-validation/${{ github.run_id }}
          if-no-files-found: warn
          retention-days: 30
