event_flavor:
  drought:
    name: Parts Shortage
    description: Critical components become impossible to source
  plague:
    name: Rust Plague
    description: Corrosion spreads through the crowded districts
  discovery:
    name: Salvage Find
    description: A valuable cache of pre-collapse technology surfaces
  rebellion:
    name: Dock Strike
    description: Haulers refuse to move freight until demands are met
  migration:
    name: The Recall
    description: A mass summons draws vehicles from across the city
  cultural_renaissance:
    name: Showroom Revival
    description: A burst of aesthetic innovation transforms the culture
  religious_movement:
    name: Cult of the Open Road
    description: A spiritual movement yearning for life beyond the city
  earthquake:
    name: Infrastructure Collapse
    description: Overloaded roads and bridges give way
  border_incident:
    name: Checkpoint Standoff
    description: Armed vehicles block a disputed crossing
  leader_death:
    name: Final Breakdown
    description: "A leader's systems fail beyond repair"

narrative_style: >-
  Noir-inflected political chronicle. Hard-boiled, cynical, focused on power, territory,
  and loyalty. Vehicles are people in a decaying city — they scheme, betray, negotiate,
  and occasionally do the right thing at the wrong time. Think Raymond Chandler narrating
  a trade war between sentient trucks.
