event_flavor:
  drought:
    name: Fuel Shortage
    description: Fuel reserves run dangerously low across the land
  plague:
    name: Rust Plague
    description: A corrosive epidemic spreads through the population
  discovery:
    name: Ancient Blueprint Discovery
    description: Plans for a forgotten technology are unearthed
  rebellion:
    name: Rogue Fleet
    description: A faction splinters as dissidents break formation
  migration:
    name: The Great Convoy
    description: A mass movement of vehicles seeking new territory
  cultural_renaissance:
    name: The Reforging
    description: A burst of creative energy transforms society
  religious_movement:
    name: Cult of the Engine
    description: A spiritual movement centered on mechanical transcendence
  earthquake:
    name: Road Collapse
    description: The ground gives way, severing vital routes
  border_incident:
    name: Highway Blockade
    description: Armed vehicles bar passage at a contested crossing
  leader_death:
    name: Final Breakdown
    description: "A leader's systems fail beyond repair"

narrative_style: >-
  Mythic and reverent, as if written by a sentient vehicle historian recording sacred
  history. Vehicles are people — they speak, think, feel, age, and die. Use automotive
  metaphors as natural language, not as wordplay. 'She rusted with grief' is literal.
  Chronicle the rise of civilizations with weight and grandeur.
