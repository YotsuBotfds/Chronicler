event_flavor:
  drought:
    name: Harsh Winter
    description: Supply lines freeze across the river valleys
  discovery:
    name: Supply Cache Discovery
    description: A pre-collapse warehouse is found intact
  migration:
    name: Refugee Column
    description: Displaced survivors arrive seeking shelter
  rebellion:
    name: Food Riot
    description: Hungry citizens turn on their own leadership
  cultural_renaissance:
    name: Harvest Festival
    description: A successful growing season brings rare celebration
  border_incident:
    name: Territorial Standoff
    description: Armed patrols meet at a disputed boundary
  plague:
    name: Sickness Outbreak
    description: Disease spreads through crowded shelters
  religious_movement:
    name: Revival Movement
    description: A charismatic preacher draws followers across faction lines
  earthquake:
    name: Bridge Collapse
    description: Critical infrastructure fails without warning
  leader_death:
    name: Winter Took Them
    description: A leader succumbs to the harsh conditions

starting_conditions:
  - type: grid-down
    affected:
      - Farmer Co-ops
      - River Towns Alliance
      - National Guard Remnant
      - Prepper Networks
      - Church Communities
      - Carleton Enclave
    duration: 999
    severity: 4

narrative_style: >-
  Terse, pragmatic tone. Midwestern understatement. Focus on weather, crops, community
  survival, and the hard math of calories and firewood. No high fantasy language.
  Think Cormac McCarthy on the prairie.
